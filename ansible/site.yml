---
- name: Deploy lab4 HTTP service
  hosts: lab4
  become: true
  vars:
    service_dir: /opt/lab4-service
    html_dir: /opt/lab4-service/html
    student_surname: Ivanova
    service_port: 8000

  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        name:
          - python3
          - curl
        state: present
        update_cache: true

    - name: Create service directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"
      loop:
        - "{{ service_dir }}"
        - "{{ html_dir }}"

    - name: Deploy index.html
      ansible.builtin.copy:
        dest: "{{ html_dir }}/index.html"
        content: "<h1>{{ student_surname }}</h1>\n"
        owner: www-data
        group: www-data
        mode: "0644"

    - name: Deploy service.sh
      ansible.builtin.copy:
        dest: "{{ service_dir }}/service.sh"
        owner: www-data
        group: www-data
        mode: "0755"
        content: |
          #!/usr/bin/env bash
          set -euo pipefail
          cd {{ html_dir }}
          exec python3 -m http.server {{ service_port }}

    - name: Deploy systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/lab4-service.service
        mode: "0644"
        content: |
          [Unit]
          Description=Lab4 HTTP service ({{ student_surname }})
          After=network.target

          [Service]
          Type=simple
          User=www-data
          Group=www-data
          WorkingDirectory={{ service_dir }}
          ExecStart={{ service_dir }}/service.sh
          Restart=on-failure
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd

    - name: Enable and start lab4-service
      ansible.builtin.systemd:
        name: lab4-service
        state: started
        enabled: true
        daemon_reload: true

    - name: Healthcheck via HTTP
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ service_port }}/"
        return_content: false
        status_code: 200
      register: health
      retries: 5
      delay: 2
      until: health.status == 200

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
